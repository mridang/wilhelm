name: Lint Code (Golint)

on: push

permissions:
  contents: write

defaults:
  run:
    working-directory: ./

env:
  GONOSUMDB: github.com/mridang/wilhelm/*

jobs:
  code-linting:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Lint root module
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.6.2
          install-mode: goinstall

      - name: Lint every submodule
        run: |
          set -euo pipefail
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.6.2
          for mod in $(find assert env -name go.mod); do
            dir=$(dirname "$mod")
            echo "==== $dir ===="
            (cd "$dir" && golangci-lint run ./...)
          done
